---
- name: Deploy Isolated Lab 3 Load Balancer
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Create unique HTML for Server A
      copy:
        dest: "/tmp/index_a.html"
        content: "<h1>Lab 3: High Availability</h1><p>Response from: <b>SERVER A</b></p>"

    - name: Create unique HTML for Server B
      copy:
        dest: "/tmp/index_b.html"
        content: "<h1>Lab 3: High Availability</h1><p>Response from: <b>SERVER B</b></p>"

    - name: Start Worker A (Port 8081)
      community.docker.docker_container:
        name: lab3-worker-a
        image: nginx:latest
        state: started
        restart_policy: always
        ports:
          - "8081:80"
        volumes:
          - "/tmp/index_a.html:/usr/share/nginx/html/index.html:ro"

    - name: Start Worker B (Port 8082)
      community.docker.docker_container:
        name: lab3-worker-b
        image: nginx:latest
        state: started
        restart_policy: always
        ports:
          - "8082:80"
        volumes:
          - "/tmp/index_b.html:/usr/share/nginx/html/index.html:ro"

    - name: Start Load Balancer (Port 8888)
      community.docker.docker_container:
        name: lab3-balancer
        image: nginx:latest
        state: started
        recreate: yes
        ports:
          - "8888:80"
        volumes:
          - "{{ playbook_dir }}/nginx.conf:/etc/nginx/nginx.conf:ro"
